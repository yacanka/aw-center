name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-secret-key-not-for-production
      DEBUG: "True"
      IPV4_ADDRESS: 127.0.0.1
      PORT: 8000
      DOCPROOF_URL: http://localhost/docproof
      DOORS_EXECUTABLE: /usr/bin/false
      JIRA_LEGACY_URL: http://localhost/jira-legacy
      JIRA_BTB_URL: http://localhost/jira-btb
      AW_USERNAME: ""
      AW_PASSWORD: ""
      ALLOWED_HOSTS: 127.0.0.1,localhost
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
      - name: Run Django system check
        working-directory: backend
        run: python manage.py check
      - name: Run Django tests
        working-directory: backend
        run: python manage.py test
      - name: Scan Python dependencies
        run: python -m pip install pip-audit && pip-audit -r requirements.txt

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install npm dependencies
        run: npm ci
      - name: Run TypeScript checks
        run: npx vue-tsc --noEmit -p tsconfig.json
      - name: Build Vite assets
        run: npm run build
      - name: Scan npm dependencies
        run: npm audit --audit-level=high
