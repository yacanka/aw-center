name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SECRET_KEY: ci-secret-key-not-for-production
      DEBUG: "True"
      IPV4_ADDRESS: 127.0.0.1
      PORT: 8000
      DOCPROOF_URL: http://localhost/docproof
      DOORS_EXECUTABLE: /usr/bin/false
      JIRA_LEGACY_URL: http://localhost/jira-legacy
      JIRA_BTB_URL: http://localhost/jira-btb
      AW_USERNAME: ""
      AW_PASSWORD: ""
      ALLOWED_HOSTS: 127.0.0.1,localhost
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Run Django system check
        working-directory: backend
        run: python manage.py check

      - name: Reject missing migrations
        working-directory: backend
        run: python manage.py makemigrations --check --dry-run

      - name: Run Django tests
        working-directory: backend
        run: python manage.py test

      - name: Scan Python dependencies
        run: python -m pip install pip-audit && pip-audit -r requirements.txt

      - name: Setup Node.js for integrated artifact smoke test
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build immutable frontend artifact
        working-directory: frontend
        run: npm ci && npm run build

      - name: Verify Django serves the built frontend artifact
        working-directory: backend
        run: python manage.py collectstatic --noinput && python manage.py verify_frontend_artifact

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Check frontend formatting
        run: npm run format:check

      - name: Run strict TypeScript checks
        run: npm run typecheck

      - name: Run frontend regression tests
        run: npm run test:ci

      - name: Build Vite assets
        run: npm run build

      - name: Scan npm dependencies
        run: npm audit --audit-level=high

  container:
    name: Immutable runtime image
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Build combined backend and frontend image
        run: >-
          docker build
          --file backend/Dockerfile
          --tag awcenter:ci
          --build-arg VITE_API_URL=/
          --build-arg VITE_VERSION=ci
          --build-arg VITE_APP_TITLE="AW Center"
          .

      - name: Verify Django and immutable frontend inside image
        run: >-
          docker run --rm
          -e DEBUG=True
          -e IPV4_ADDRESS=127.0.0.1
          -e PORT=8000
          -e DOCPROOF_URL=http://localhost/docproof
          -e DOORS_EXECUTABLE=/usr/bin/false
          -e JIRA_LEGACY_URL=http://localhost/jira-legacy
          -e JIRA_BTB_URL=http://localhost/jira-btb
          awcenter:ci
          python manage.py verify_frontend_artifact
