name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SECRET_KEY: ci-secret-key-not-for-production
      DEBUG: "True"
      IPV4_ADDRESS: 127.0.0.1
      PORT: 8000
      DOCPROOF_URL: http://localhost/docproof
      DOORS_EXECUTABLE: /usr/bin/false
      JIRA_LEGACY_URL: http://localhost/jira-legacy
      JIRA_BTB_URL: http://localhost/jira-btb
      AW_USERNAME: ""
      AW_PASSWORD: ""
      ALLOWED_HOSTS: 127.0.0.1,localhost
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Run Django system check
        working-directory: backend
        run: python manage.py check

      - name: Run Django tests
        working-directory: backend
        run: python manage.py test

      - name: Scan Python dependencies
        run: python -m pip install pip-audit && pip-audit -r requirements.txt

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm dependencies
        run: npm install

      - name: Format frontend sources
        run: npm run format

      - name: Check frontend formatting
        run: npm run format:check

      - name: Run TypeScript syntax checks
        run: npm run typecheck:ci

      - name: Test quick command search
        run: npm run test:ci

      - name: Build Vite assets
        run: npm run build

      - name: Scan npm dependencies
        run: npm audit --audit-level=high
