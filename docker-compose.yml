services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      SECRET_KEY: local-compose-development-secret-key-change-before-production-2026
      DEBUG: "False"
      IPV4_ADDRESS: 0.0.0.0
      PORT: 8000
      ALLOWED_HOSTS: 127.0.0.1,localhost,backend
      CORS_ALLOWED_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
      CSRF_TRUSTED_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
      DATABASE_URL: postgres://awcenter:change-me-local-only@database:5432/awcenter
      CACHE_URL: redis://redis:6379/1
      AUTH_COOKIE_SECURE: "False"
      AUTH_COOKIE_SAMESITE: Lax
      SECURE_SSL_REDIRECT: "False"
      DOCPROOF_URL: http://docproof.local
      DOORS_EXECUTABLE: /usr/bin/false
      TEAMCENTER_BASE_URL: ${TEAMCENTER_BASE_URL:-}
      TEAMCENTER_SERVICE_ROOT: ${TEAMCENTER_SERVICE_ROOT:-RestServices}
      TEAMCENTER_AUTH_MODE: ${TEAMCENTER_AUTH_MODE:-password}
      TEAMCENTER_USERNAME: ${TEAMCENTER_USERNAME:-}
      TEAMCENTER_PASSWORD: ${TEAMCENTER_PASSWORD:-}
      TEAMCENTER_VERIFY_SSL: ${TEAMCENTER_VERIFY_SSL:-true}
      TEAMCENTER_JSESSIONID: ${TEAMCENTER_JSESSIONID:-}
      TEAMCENTER_XSRF_TOKEN: ${TEAMCENTER_XSRF_TOKEN:-}
      JIRA_LEGACY_URL: http://jira-legacy.local
      JIRA_BTB_URL: http://jira-btb.local
    volumes:
      - backend-media:/app/media
      - backend-static:/app/static
    ports:
      - "8000:8000"
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health/ready/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
        VITE_VERSION: local-compose
        VITE_APP_TITLE: AW Center
    ports:
      - "8080:80"
    depends_on:
      - backend

  database:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: awcenter
      POSTGRES_USER: awcenter
      POSTGRES_PASSWORD: change-me-local-only
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U awcenter -d awcenter"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis-data:/data

volumes:
  backend-media:
  backend-static:
  postgres-data:
  redis-data:
